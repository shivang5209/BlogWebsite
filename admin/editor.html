<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article Editor — Shivang Codes</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Quill (Rich Text Editor) -->
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

  <!-- EasyMDE (Markdown Editor) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>

  <!-- Marked.js (Markdown parsing for toggle sync) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      padding-top: 1.5rem;
      overflow-y: auto;
    }
    .editor-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }
    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 1rem;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      transition: var(--transition);
    }
    .back-btn:hover {
      color: var(--text-primary);
    }
    
    .editor-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 2rem;
    }
    @media (max-width: 900px) {
      .editor-layout {
        grid-template-columns: 1fr;
      }
    }
    
    .editor-card {
      background: var(--card-dark-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      transition: var(--transition);
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--accent-purple);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.1);
    }
    
    .slug-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .slug-preview {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      word-break: break-all;
      margin-top: 0.25rem;
    }
    
    /* Cover Image Box */
    .image-upload-area {
      border: 2px dashed var(--card-border);
      border-radius: 8px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.01);
      transition: var(--transition);
      margin-bottom: 0.75rem;
      position: relative;
    }
    .image-upload-area:hover {
      border-color: var(--accent-purple);
      background: rgba(139, 92, 246, 0.03);
    }
    .image-upload-area i {
      font-size: 1.8rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }
    .image-preview {
      width: 100%;
      height: 120px;
      border-radius: 6px;
      background-size: cover;
      background-position: center;
      display: none;
      margin-bottom: 0.75rem;
      border: 1px solid var(--card-border);
    }
    .file-input {
      display: none;
    }
    
    /* Dual Editor Toggle */
    .editor-toggle-bar {
      display: flex;
      background: rgba(0, 0, 0, 0.2);
      padding: 0.25rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      border: 1px solid var(--card-border);
    }
    .editor-toggle-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 0.5rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: var(--transition);
    }
    .editor-toggle-btn.active {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 2px 8px rgba(139, 92, 246, 0.25);
    }
    
    /* Editor containers */
    .editor-container {
      margin-top: 1rem;
    }
    #quill-editor-wrapper {
      background: rgba(255, 255, 255, 0.01);
      border-radius: 8px;
      border: 1px solid var(--card-border);
      position: relative;
    }
    
    /* Custom Quill Tooltip Styling (for link/image popups) */
    .ql-tooltip {
      background-color: var(--bg-secondary) !important;
      border: 1px solid var(--card-border) !important;
      color: var(--text-primary) !important;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5) !important;
      border-radius: 8px !important;
      z-index: 2000 !important;
      padding: 10px 12px !important;
    }
    .ql-tooltip input[type=text] {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid var(--card-border) !important;
      color: var(--text-primary) !important;
      border-radius: 4px !important;
      padding: 6px 10px !important;
      margin-right: 8px !important;
      font-family: var(--font-sans) !important;
    }
    .ql-tooltip a.ql-action::after {
      color: var(--accent-purple) !important;
      font-weight: 600 !important;
      text-decoration: none !important;
      margin-right: 8px !important;
    }
    .ql-tooltip a.ql-remove::before {
      color: #f87171 !important;
      text-decoration: none !important;
    }
    .ql-tooltip.ql-hidden {
      display: none !important;
    }
    #quill-editor {
      height: 450px;
      font-size: 1rem;
      color: var(--text-primary);
      border: none !important;
    }
    .ql-toolbar {
      background: rgba(255, 255, 255, 0.02) !important;
      border-color: var(--card-border) !important;
      border-top: none !important;
      border-left: none !important;
      border-right: none !important;
    }
    .ql-stroke {
      stroke: var(--text-secondary) !important;
    }
    .ql-fill {
      fill: var(--text-secondary) !important;
    }
    .ql-picker {
      color: var(--text-secondary) !important;
    }
    .ql-picker-options {
      background: var(--bg-secondary) !important;
      border-color: var(--card-border) !important;
    }
    
    /* EasyMDE Dark Customizations */
    .EasyMDEContainer {
      background: rgba(255, 255, 255, 0.01);
      border-radius: 8px;
      border: 1px solid var(--card-border);
      overflow: hidden;
    }
    .editor-toolbar {
      background: rgba(255, 255, 255, 0.02) !important;
      border-color: var(--card-border) !important;
      opacity: 1 !important;
    }
    .editor-toolbar button {
      color: var(--text-secondary) !important;
    }
    .editor-toolbar button:hover, .editor-toolbar button.active {
      background: rgba(255, 255, 255, 0.08) !important;
      color: var(--text-primary) !important;
    }
    .editor-toolbar i.separator {
      border-left: 1px solid var(--card-border) !important;
    }
    .CodeMirror {
      background: transparent !important;
      border: none !important;
      color: var(--text-primary) !important;
      font-family: var(--font-mono) !important;
      height: 450px !important;
    }
    .CodeMirror-cursor {
      border-left: 1px solid var(--text-primary) !important;
    }
    .editor-preview-active-side {
      background: var(--bg-secondary) !important;
      border-left: 1px solid var(--card-border) !important;
      color: var(--text-primary) !important;
    }

    /* Actions */
    .editor-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    
    .btn-action-primary {
      background: var(--accent-gradient);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.25);
      transition: var(--transition);
      text-decoration: none;
    }
    .btn-action-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.45);
    }
    .btn-action-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }
    
    .featured-checkbox {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      user-select: none;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .featured-checkbox input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent-purple);
      cursor: pointer;
    }

    .status-section {
      border-top: 1px solid var(--card-border);
      padding-top: 1.5rem;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>

  <div class="editor-wrapper">
    <!-- Header -->
    <header class="editor-header" style="position: static; top: auto; left: auto; right: auto; margin-bottom: 2rem; display: flex; width: 100%; max-width: 100%; border-radius: 0; background: transparent; border: none; box-shadow: none; padding: 0 0 1rem 0; border-bottom: 1px solid var(--card-border);">
      <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
      <h2 id="page-action-title" style="font-size: 1.3rem; font-weight: 800;">Write New Article</h2>
    </header>

    <!-- Layout -->
    <div class="editor-layout">
      <!-- Main Editor Panel -->
      <div class="editor-card" style="display: flex; flex-direction: column;">
        <!-- Title Input -->
        <div class="form-group">
          <label for="post-title">Article Title</label>
          <input type="text" id="post-title" class="form-input" placeholder="e.g. Mastering Advanced CSS Grid & Flexbox Layouts" required>
        </div>

        <!-- Editor Toggle Bar -->
        <div class="editor-toggle-bar">
          <button class="editor-toggle-btn active" id="toggle-richtext" type="button">
            <i class="fa-solid fa-wand-magic-sparkles"></i> Rich Text (Quill)
          </button>
          <button class="editor-toggle-btn" id="toggle-markdown" type="button">
            <i class="fa-solid fa-code"></i> Markdown (MDE)
          </button>
        </div>

        <!-- Editor Containers -->
        <div class="editor-container">
          <!-- Rich Text Container -->
          <div id="richtext-editor-container">
            <div id="quill-editor-wrapper">
              <div id="quill-editor"></div>
            </div>
          </div>
          <!-- Markdown Container -->
          <div id="markdown-editor-container" style="display: none;">
            <textarea id="markdown-editor"></textarea>
          </div>
        </div>
      </div>

      <!-- Metadata / Sidebar Panel -->
      <div>
        <div class="editor-card" style="padding: 1.5rem;">
          <h3 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 1.25rem; border-bottom: 1px solid var(--card-border); padding-bottom: 0.5rem;">Metadata</h3>
          
          <!-- Slug Input -->
          <div class="form-group">
            <label for="post-slug">URL Slug</label>
            <input type="text" id="post-slug" class="form-input" placeholder="e.g. css-grid-mastery" style="font-family: var(--font-mono); font-size: 0.85rem;">
            <div class="slug-preview" id="slug-preview-text">blog.shivangcodes.in/post.html?id=...</div>
          </div>

          <!-- Category Select -->
          <div class="form-group">
            <label for="post-category">Category</label>
            <select id="post-category" class="form-select" required>
              <option value="" disabled selected>Select category</option>
              <option value="Research">Research</option>
              <option value="Projects">Projects</option>
              <option value="Tech">Tech</option>
              <option value="Code">Code</option>
              <option value="Tutorials">Tutorials</option>
              <option value="Personal">Personal</option>
            </select>
          </div>

          <!-- Tags Input -->
          <div class="form-group">
            <label for="post-tags">Tags (Comma Separated)</label>
            <input type="text" id="post-tags" class="form-input" placeholder="e.g. AI, Protocols, Go">
          </div>

          <!-- Excerpt Textarea -->
          <div class="form-group">
            <label for="post-excerpt">Excerpt / Summary</label>
            <textarea id="post-excerpt" class="form-textarea" rows="3" placeholder="Write a short teaser summary for post cards..." style="font-size: 0.85rem; resize: vertical;"></textarea>
          </div>

          <!-- Cover Image Input & Upload -->
          <div class="form-group">
            <label>Cover Image</label>
            <div class="image-preview" id="cover-image-preview"></div>
            <div class="image-upload-area" id="upload-trigger">
              <i class="fa-solid fa-cloud-arrow-up"></i>
              <p style="font-size: 0.8rem; font-weight: 500; color: var(--text-secondary);">Click to upload an image</p>
              <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 0.2rem;">Max size: 5MB</p>
              <input type="file" id="file-uploader" class="file-input" accept="image/*">
            </div>
            <input type="text" id="post-cover-image" class="form-input" placeholder="Or paste absolute image URL..." style="font-size: 0.85rem;">
          </div>

          <!-- Featured Checkbox -->
          <label class="featured-checkbox">
            <input type="checkbox" id="post-featured">
            <span>Pin as Featured Post</span>
          </label>

          <!-- Publish / Status Management -->
          <div class="status-section">
            <div class="form-group">
              <label for="post-status">Status</label>
              <select id="post-status" class="form-select">
                <option value="draft">Draft (Private)</option>
                <option value="published">Publish Now</option>
                <option value="scheduled">Schedule Post</option>
              </select>
            </div>

            <!-- Scheduled Date/Time picker -->
            <div class="form-group" id="scheduled-date-group" style="display: none;">
              <label for="post-scheduled-at">Publish Date & Time</label>
              <input type="datetime-local" id="post-scheduled-at" class="form-input" style="font-size: 0.9rem;">
            </div>

            <div class="editor-actions">
              <button class="btn-action-primary" id="save-post-btn" style="justify-content: center; width: 100%;">
                <i class="fa-solid fa-floppy-disk"></i> Save Article
              </button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Firebase Core SDK and Auth/Firestore/Storage Libraries -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  
  <!-- Firebase Project Configuration -->
  <script src="../firebase-config.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Auth State Validation
      let currentUser = null;
      window.auth.onAuthStateChanged(user => {
        if (!user) {
          window.location.href = 'login.html';
        } else {
          currentUser = user;
          // If in Edit Mode, fetch post once auth is resolved
          if (postId) {
            loadPostData();
          }
        }
      });

      // Check URL parameters for Edit Mode (Firestore Doc ID)
      const urlParams = new URLSearchParams(window.location.search);
      const postId = urlParams.get('id'); 
      
      let editorMode = 'richtext'; // 'richtext' or 'markdown'
      let quill = null;
      let easymde = null;
      let isUploading = false;
      let postCreatedTimestamp = null; // Store original timestamp if editing

      // DOM Elements
      const titleInput = document.getElementById('post-title');
      const slugInput = document.getElementById('post-slug');
      const categorySelect = document.getElementById('post-category');
      const tagsInput = document.getElementById('post-tags');
      const excerptInput = document.getElementById('post-excerpt');
      const coverImageInput = document.getElementById('post-cover-image');
      const coverPreview = document.getElementById('cover-image-preview');
      const featuredCheck = document.getElementById('post-featured');
      const statusSelect = document.getElementById('post-status');
      const schedGroup = document.getElementById('scheduled-date-group');
      const schedInput = document.getElementById('post-scheduled-at');
      const saveBtn = document.getElementById('save-post-btn');
      const slugPreviewText = document.getElementById('slug-preview-text');

      // Initialize Editors
      initRichTextEditor();
      initMarkdownEditor();

      // Show/Hide scheduled date based on status selection
      statusSelect.addEventListener('change', (e) => {
        if (e.target.value === 'scheduled') {
          schedGroup.style.display = 'block';
          const now = new Date();
          now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
          schedInput.min = now.toISOString().slice(0, 16);
        } else {
          schedGroup.style.display = 'none';
        }
      });

      // Auto-generate slug from title
      titleInput.addEventListener('input', (e) => {
        if (!postId) { // Only auto-generate slug for new posts
          const slug = generateSlug(e.target.value);
          slugInput.value = slug;
          updateSlugPreview(slug);
        }
      });

      slugInput.addEventListener('input', (e) => {
        const slug = generateSlug(e.target.value);
        slugInput.value = slug;
        updateSlugPreview(slug);
      });

      function generateSlug(text) {
        return text
          .toLowerCase()
          .trim()
          .replace(/[^\w\s-]/g, '')
          .replace(/[\s_-]+/g, '-')
          .replace(/^-+|-+$/g, '');
      }

      function updateSlugPreview(slug) {
        if (slug) {
          slugPreviewText.innerText = `blog.shivangcodes.in/post.html?id=${slug}`;
          slugPreviewText.style.color = 'var(--accent-purple)';
        } else {
          slugPreviewText.innerText = 'blog.shivangcodes.in/post.html?id=...';
          slugPreviewText.style.color = 'var(--text-muted)';
        }
      }

      // Cover image input preview handler
      coverImageInput.addEventListener('input', (e) => {
        setCoverPreview(e.target.value);
      });

      function setCoverPreview(url) {
        if (url && url.trim() !== '') {
          coverPreview.style.backgroundImage = `url('${url}')`;
          coverPreview.style.display = 'block';
        } else {
          coverPreview.style.display = 'none';
        }
      }

      // Upload Cover Image directly to Firebase Storage
      const uploadTrigger = document.getElementById('upload-trigger');
      const fileUploader = document.getElementById('file-uploader');

      uploadTrigger.addEventListener('click', () => {
        fileUploader.click();
      });

      fileUploader.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (isUploading) return;
        isUploading = true;
        
        uploadTrigger.querySelector('p').innerText = 'Uploading to Firebase...';
        uploadTrigger.querySelector('i').className = 'fa-solid fa-spinner fa-spin';

        try {
          const uid = currentUser.uid;
          const extension = file.name.split('.').pop();
          const fileName = `cover-${Date.now()}.${extension}`;
          
          // Reference path in Firebase Storage
          const storageRef = window.storage.ref(`uploads/${uid}/${fileName}`);
          
          // Perform upload
          const uploadTaskSnapshot = await storageRef.put(file);
          const downloadURL = await uploadTaskSnapshot.ref.getDownloadURL();

          // Success: Set values
          coverImageInput.value = downloadURL;
          setCoverPreview(downloadURL);

          uploadTrigger.querySelector('p').innerText = 'Image uploaded successfully!';
          uploadTrigger.querySelector('i').className = 'fa-solid fa-circle-check';
          uploadTrigger.querySelector('i').style.color = '#10b981';

          setTimeout(() => {
            uploadTrigger.querySelector('p').innerText = 'Click to replace image';
            uploadTrigger.querySelector('i').className = 'fa-solid fa-cloud-arrow-up';
            uploadTrigger.querySelector('i').style.color = '';
          }, 3000);

        } catch (err) {
          console.error(err);
          alert('Upload failed: ' + err.message);
          uploadTrigger.querySelector('p').innerText = 'Upload failed. Try again.';
          uploadTrigger.querySelector('i').className = 'fa-solid fa-circle-xmark';
          uploadTrigger.querySelector('i').style.color = '#ef4444';
        } finally {
          isUploading = false;
          fileUploader.value = ''; // Reset input file
        }
      });

      // Reading time calculator
      function calculateReadTime(content, contentType) {
        let text = content || '';
        if (contentType === 'richtext') {
          text = text.replace(/<[^>]*>/g, ' '); // Strip HTML
        } else {
          text = text.replace(/[#*`_\[\]()\-]/g, ' '); // Strip markdown characters
        }
        const words = text.trim().split(/\s+/).filter(w => w.length > 0).length;
        const wpm = 200;
        const minutes = Math.max(1, Math.round(words / wpm));
        return `${minutes} min read`;
      }

      // Convert Rich Text HTML to basic Markdown
      function htmlToMarkdown(html) {
        let md = html || '';
        md = md.replace(/<h1>(.*?)<\/h1>/gi, '# $1\n');
        md = md.replace(/<h2>(.*?)<\/h2>/gi, '## $1\n');
        md = md.replace(/<h3>(.*?)<\/h3>/gi, '### $1\n');
        md = md.replace(/<strong>(.*?)<\/strong>/gi, '**$1**');
        md = md.replace(/<b>(.*?)<\/b>/gi, '**$1**');
        md = md.replace(/<em>(.*?)<\/em>/gi, '_$1_');
        md = md.replace(/<i>(.*?)<\/i>/gi, '_$1_');
        md = md.replace(/<p>(.*?)<\/p>/gi, '$1\n\n');
        md = md.replace(/<a href="(.*?)">(.*?)<\/a>/gi, '[$2]($1)');
        
        md = md.replace(/<ul>([\s\S]*?)<\/ul>/gi, (m, li) => {
          return li.replace(/<li>(.*?)<\/li>/gi, '- $1\n');
        });
        md = md.replace(/<ol>([\s\S]*?)<\/ol>/gi, (m, li) => {
          return li.replace(/<li>(.*?)<\/li>/gi, '1. $1\n');
        });
        
        md = md.replace(/<pre><code.*?>([\s\S]*?)<\/code><\/pre>/gi, '```\n$1\n```\n');
        md = md.replace(/<br\s*\/?>/gi, '\n');
        
        md = md.replace(/<[^>]+>/g, '');
        return md.trim();
      }

      function markdownToHtml(md) {
        if (!md) return '';
        return marked.parse(md);
      }

      // Editor Mode Toggles
      const toggleRichTextBtn = document.getElementById('toggle-richtext');
      const toggleMarkdownBtn = document.getElementById('toggle-markdown');
      const richTextContainer = document.getElementById('richtext-editor-container');
      const markdownContainer = document.getElementById('markdown-editor-container');

      toggleRichTextBtn.addEventListener('click', () => {
        if (editorMode === 'richtext') return;
        
        const mdText = easymde.value();
        const htmlText = markdownToHtml(mdText);
        quill.setContents(quill.clipboard.convert({ html: htmlText }));

        toggleRichTextBtn.classList.add('active');
        toggleMarkdownBtn.classList.remove('active');
        richTextContainer.style.display = 'block';
        markdownContainer.style.display = 'none';
        
        editorMode = 'richtext';
      });

      toggleMarkdownBtn.addEventListener('click', () => {
        if (editorMode === 'markdown') return;

        const htmlText = quill.root.innerHTML;
        const mdText = htmlToMarkdown(htmlText);
        easymde.value(mdText);

        toggleMarkdownBtn.classList.add('active');
        toggleRichTextBtn.classList.remove('active');
        richTextContainer.style.display = 'none';
        markdownContainer.style.display = 'block';
        
        setTimeout(() => {
          easymde.codemirror.refresh();
        }, 50);

        editorMode = 'markdown';
      });

      function initRichTextEditor() {
        const toolbarOptions = [
          [{ 'header': [1, 2, 3, false] }],
          ['bold', 'italic', 'underline', 'strike'],        
          ['blockquote', 'code-block'],
          [{ 'list': 'ordered'}, { 'list': 'bullet' }],
          ['link', 'image'],
          ['clean']                                         
        ];
        
        quill = new Quill('#quill-editor', {
          theme: 'snow',
          modules: {
            toolbar: toolbarOptions
          }
        });
      }

      function initMarkdownEditor() {
        easymde = new EasyMDE({
          element: document.getElementById('markdown-editor'),
          spellChecker: false,
          autosave: { enabled: false },
          status: ['words', 'lines'],
          renderingConfig: {
            singleLineBreaks: false,
            codeSyntaxHighlighting: true,
          },
          placeholder: 'Write your article using Markdown...'
        });
      }

      // Fetch article if in Edit Mode (using Firestore doc id)
      async function loadPostData() {
        try {
          const doc = await window.db.collection('posts').doc(postId).get();
          
          if (!doc.exists) {
            alert('Article not found.');
            window.location.href = 'dashboard.html';
            return;
          }

          const post = doc.data();

          // Check permissions
          if (post.authorId !== currentUser.uid) {
            alert('Access Denied. You can only edit your own articles.');
            window.location.href = 'dashboard.html';
            return;
          }

          postCreatedTimestamp = post.created_at;

          // Populate inputs
          titleInput.value = post.title;
          slugInput.value = post.slug;
          updateSlugPreview(post.slug);
          categorySelect.value = post.category;
          tagsInput.value = (post.tags || []).join(', ');
          excerptInput.value = post.excerpt || '';
          coverImageInput.value = post.cover_image || '';
          setCoverPreview(post.cover_image);
          featuredCheck.checked = post.featured === true;
          statusSelect.value = post.status;

          // Scheduled Date populate
          if (post.status === 'scheduled' && post.scheduled_at) {
            schedGroup.style.display = 'block';
            const date = new Date(post.scheduled_at);
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            const hh = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            schedInput.value = `${yyyy}-${mm}-${dd}T${hh}:${min}`;
          }

          // Load Content into Editor
          editorMode = post.content_type || 'richtext';
          if (editorMode === 'richtext') {
            quill.root.innerHTML = post.content;
            toggleRichTextBtn.classList.add('active');
            toggleMarkdownBtn.classList.remove('active');
            richTextContainer.style.display = 'block';
            markdownContainer.style.display = 'none';
          } else {
            easymde.value(post.content);
            toggleMarkdownBtn.classList.add('active');
            toggleRichTextBtn.classList.remove('active');
            richTextContainer.style.display = 'none';
            markdownContainer.style.display = 'block';
            setTimeout(() => {
              easymde.codemirror.refresh();
            }, 50);
          }

        } catch (err) {
          alert('Failed to retrieve post data: ' + err.message);
          window.location.href = 'dashboard.html';
        }
      }

      // Save Post Submission to Firestore
      saveBtn.addEventListener('click', async () => {
        const title = titleInput.value.trim();
        const slug = slugInput.value.trim() || generateSlug(title);
        const category = categorySelect.value;
        const tags = tagsInput.value.split(',').map(t => t.trim()).filter(t => t.length > 0);
        const excerpt = excerptInput.value.trim();
        const cover_image = coverImageInput.value.trim() || 'https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=600';
        const featured = featuredCheck.checked;
        const status = statusSelect.value;
        const scheduled_at = status === 'scheduled' ? schedInput.value : null;

        // Get Content from Active Editor
        const content = (editorMode === 'richtext') ? quill.root.innerHTML : easymde.value();

        if (!title) {
          alert('Please enter a post title.');
          return;
        }
        if (!category) {
          alert('Please select a category.');
          return;
        }
        if (!content || content.trim() === '' || content === '<p><br></p>') {
          alert('Please enter post content.');
          return;
        }
        if (status === 'scheduled' && !scheduled_at) {
          alert('Please specify a scheduled publication date & time.');
          return;
        }

        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';

        const readTime = calculateReadTime(content, editorMode);

        const payload = {
          title,
          slug,
          category,
          tags,
          excerpt,
          cover_image,
          content,
          content_type: editorMode,
          featured,
          status,
          read_time: readTime,
          scheduled_at: scheduled_at ? new Date(scheduled_at).toISOString() : null,
          authorId: currentUser.uid,
          authorName: currentUser.displayName || currentUser.email,
          authorPhoto: currentUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.displayName || currentUser.email)}&background=8b5cf6&color=fff`,
          updated_at: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
          if (!postId) {
            // Check slug uniqueness across published posts or current user's posts
            const publishedCheck = await window.db.collection('posts')
              .where('slug', '==', slug)
              .where('status', '==', 'published')
              .get();
            const myCheck = await window.db.collection('posts')
              .where('slug', '==', slug)
              .where('authorId', '==', currentUser.uid)
              .get();

            if (!publishedCheck.empty || !myCheck.empty) {
              throw new Error('This URL Slug already exists. Please customize the slug to make it unique.');
            }

            payload.created_at = firebase.firestore.FieldValue.serverTimestamp();
            payload.published_at = status === 'published' 
              ? firebase.firestore.FieldValue.serverTimestamp() 
              : (status === 'scheduled' ? new Date(scheduled_at) : null);

            await window.db.collection('posts').add(payload);
          } else {
            // Check slug uniqueness excluding this document
            const publishedCheck = await window.db.collection('posts')
              .where('slug', '==', slug)
              .where('status', '==', 'published')
              .get();
            const myCheck = await window.db.collection('posts')
              .where('slug', '==', slug)
              .where('authorId', '==', currentUser.uid)
              .get();

            let isDuplicate = false;
            publishedCheck.forEach(doc => {
              if (doc.id !== postId) isDuplicate = true;
            });
            myCheck.forEach(doc => {
              if (doc.id !== postId) isDuplicate = true;
            });
            
            if (isDuplicate) {
              throw new Error('This URL Slug already exists. Please customize the slug to make it unique.');
            }

            payload.created_at = postCreatedTimestamp || firebase.firestore.FieldValue.serverTimestamp();
            payload.published_at = status === 'published' 
              ? firebase.firestore.FieldValue.serverTimestamp() 
              : (status === 'scheduled' ? new Date(scheduled_at) : null);

            await window.db.collection('posts').doc(postId).update(payload);
          }

          alert(postId ? 'Post updated successfully!' : 'Post created successfully!');
          window.location.href = 'dashboard.html';

        } catch (err) {
          alert('Error saving article: ' + err.message);
          saveBtn.disabled = false;
          saveBtn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Article';
        }
      });

    });
  </script>
</body>
</html>
