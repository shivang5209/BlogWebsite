<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS Login & Portal — Shivang Codes</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-card {
      width: 100%;
      max-width: 440px;
      background: var(--card-dark-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-header .logo-icon {
      width: 48px;
      height: 48px;
      background: var(--accent-gradient);
      color: white;
      font-weight: 800;
      font-size: 1.5rem;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }
    .login-header h2 {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .login-header p {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper i {
      position: absolute;
      left: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.95rem;
      transition: var(--transition);
    }
    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      transition: var(--transition);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent-purple);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.15);
    }
    .form-input:focus + i {
      color: var(--accent-purple);
    }
    .btn-submit {
      width: 100%;
      background: var(--accent-gradient);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
      transition: var(--transition);
      margin-top: 1.5rem;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5);
    }
    .btn-submit:active {
      transform: translateY(0);
    }
    .alert {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: none;
      line-height: 1.4;
    }
    .toggle-mode {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .toggle-mode a {
      color: var(--accent-purple);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
      cursor: pointer;
    }
    .toggle-mode a:hover {
      text-decoration: underline;
      color: var(--text-primary);
    }
    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: var(--transition);
    }
    .back-home:hover {
      color: var(--text-primary);
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-icon">S</div>
        <h2 id="portal-title">Sign In</h2>
        <p id="portal-subtitle">Access the shivangcodes.in portal</p>
      </div>

      <div id="auth-error" class="alert"></div>

      <form id="auth-form">
        <!-- Name field for Sign Up -->
        <div class="form-group" id="name-group" style="display: none;">
          <label for="name">Full Name</label>
          <div class="input-wrapper">
            <input type="text" id="name" class="form-input" placeholder="e.g. John Doe">
            <i class="fa-solid fa-user"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <input type="email" id="email" class="form-input" placeholder="name@email.com" required autocomplete="email">
            <i class="fa-solid fa-envelope"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
            <i class="fa-solid fa-lock"></i>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">
          Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i>
        </button>
      </form>

      <div class="toggle-mode">
        <span id="toggle-text">Don't have an account?</span>
        <a id="toggle-action">Sign Up</a>
      </div>

      <div style="text-align: center;">
        <a href="../index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to Blog</a>
      </div>
    </div>
  </div>

  <!-- Firebase Core SDK and Auth/Firestore Libraries -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  
  <!-- Firebase Project Configuration -->
  <script src="../firebase-config.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Check auth state
      window.auth.onAuthStateChanged(user => {
        if (user) {
          window.location.href = 'dashboard.html';
        }
      });

      const form = document.getElementById('auth-form');
      const submitBtn = document.getElementById('submit-btn');
      const errorDiv = document.getElementById('auth-error');
      
      const nameGroup = document.getElementById('name-group');
      const nameInput = document.getElementById('name');
      const portalTitle = document.getElementById('portal-title');
      const portalSubtitle = document.getElementById('portal-subtitle');
      const toggleText = document.getElementById('toggle-text');
      const toggleAction = document.getElementById('toggle-action');

      let authMode = 'login'; // 'login' or 'signup'

      // Toggle between Login and Signup modes
      toggleAction.addEventListener('click', () => {
        errorDiv.style.display = 'none';
        
        if (authMode === 'login') {
          authMode = 'signup';
          portalTitle.innerText = 'Create Account';
          portalSubtitle.innerText = 'Register to write and publish blogs';
          nameGroup.style.display = 'block';
          nameInput.required = true;
          submitBtn.innerHTML = 'Register <i class="fa-solid fa-user-plus"></i>';
          toggleText.innerText = 'Already have an account?';
          toggleAction.innerText = 'Sign In';
        } else {
          authMode = 'login';
          portalTitle.innerText = 'Sign In';
          portalSubtitle.innerText = 'Access the shivangcodes.in portal';
          nameGroup.style.display = 'none';
          nameInput.required = false;
          submitBtn.innerHTML = 'Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i>';
          toggleText.innerText = "Don't have an account?";
          toggleAction.innerText = 'Sign Up';
        }
      });

      // Submit Form
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const name = nameInput.value.trim();

        errorDiv.style.display = 'none';
        submitBtn.disabled = true;
        
        if (authMode === 'login') {
          submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing In...';
          
          window.auth.signInWithEmailAndPassword(email, password)
            .then(() => {
              window.location.href = 'dashboard.html';
            })
            .catch(err => {
              console.error(err);
              errorDiv.innerText = err.message;
              errorDiv.style.display = 'block';
              submitBtn.disabled = false;
              submitBtn.innerHTML = 'Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i>';
            });
            
        } else {
          submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating Account...';
          
          window.auth.createUserWithEmailAndPassword(email, password)
            .then(async (userCredential) => {
              const user = userCredential.user;
              
              // Update user profile display name
              await user.updateProfile({
                displayName: name,
                photoURL: `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=8b5cf6&color=fff`
              });
              
              // Save user profile settings to Firestore database
              await window.db.collection('users').doc(user.uid).set({
                displayName: name,
                email: email,
                avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=8b5cf6&color=fff`,
                registered_at: firebase.firestore.FieldValue.serverTimestamp()
              });

              window.location.href = 'dashboard.html';
            })
            .catch(err => {
              console.error(err);
              errorDiv.innerText = err.message;
              errorDiv.style.display = 'block';
              submitBtn.disabled = false;
              submitBtn.innerHTML = 'Register <i class="fa-solid fa-user-plus"></i>';
            });
        }
      });
    });
  </script>
</body>
</html>
