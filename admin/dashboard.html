<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Shivang Codes</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      padding-top: 2rem;
    }
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 1.5rem;
    }
    .admin-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 800;
      font-size: 1.25rem;
      color: var(--text-primary);
      text-decoration: none;
    }
    .admin-logo .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent-gradient);
      color: white;
      font-weight: 800;
      font-size: 1.2rem;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .admin-nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .admin-user {
      font-size: 0.9rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .admin-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background-size: cover;
      border: 1.5px solid var(--accent-purple);
    }
    .btn-logout {
      background: transparent;
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #f87171;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-sans);
      font-weight: 500;
      font-size: 0.85rem;
      transition: var(--transition);
    }
    .btn-logout:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: #ef4444;
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    .stat-card {
      background: var(--card-dark-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .stat-info h3 {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.1;
    }
    .stat-info p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.25rem;
    }
    .stat-icon {
      font-size: 2rem;
      color: var(--accent-purple);
      opacity: 0.8;
      width: 50px;
      height: 50px;
      background: rgba(139, 92, 246, 0.08);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stat-card:nth-child(2) .stat-icon {
      color: #10b981;
      background: rgba(16, 185, 129, 0.08);
    }
    .stat-card:nth-child(3) .stat-icon {
      color: #fbbf24;
      background: rgba(251, 191, 36, 0.08);
    }
    .stat-card:nth-child(4) .stat-icon {
      color: #3b82f6;
      background: rgba(59, 130, 246, 0.08);
    }

    /* Actions Bar */
    .actions-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .actions-bar h2 {
      font-size: 1.5rem;
      font-weight: 800;
    }
    .actions-group {
      display: flex;
      gap: 1rem;
    }
    .btn-action-primary {
      background: var(--accent-gradient);
      color: white;
      border: none;
      padding: 0.65rem 1.25rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.25);
      transition: var(--transition);
      text-decoration: none;
    }
    .btn-action-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
    }

    /* Table styles */
    .table-wrapper {
      background: var(--card-dark-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    th {
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid var(--card-border);
      padding: 1rem 1.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    td {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 0.95rem;
      color: var(--text-primary);
    }
    tr:last-child td {
      border-bottom: none;
    }
    tr:hover td {
      background: rgba(255, 255, 255, 0.01);
    }
    
    .post-title-cell {
      font-weight: 600;
      max-width: 360px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .post-category-cell {
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    
    /* Status Badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.6rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .status-published {
      background: rgba(16, 185, 129, 0.08);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    .status-draft {
      background: rgba(148, 163, 184, 0.08);
      color: #94a3b8;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    .status-scheduled {
      background: rgba(59, 130, 246, 0.08);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }
    
    /* Action Buttons */
    .actions-column {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }
    .btn-table {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      color: var(--text-secondary);
      width: 34px;
      height: 34px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
    }
    .btn-table:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
      border-color: var(--text-secondary);
    }
    .btn-table-edit:hover {
      color: var(--accent-purple);
      border-color: rgba(139, 92, 246, 0.4);
      background: rgba(139, 92, 246, 0.06);
    }
    .btn-table-delete:hover {
      color: #f87171;
      border-color: rgba(239, 68, 68, 0.4);
      background: rgba(239, 68, 68, 0.06);
    }
    
    .loading-spinner {
      text-align: center;
      padding: 4rem 0;
      color: var(--text-secondary);
    }
    .empty-state {
      text-align: center;
      padding: 4rem 0;
      color: var(--text-secondary);
    }
    .empty-state i {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    
    .featured-icon {
      color: #fbbf24;
      margin-left: 0.5rem;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <div class="admin-container">
    <!-- Header -->
    <header class="admin-header" style="position: static; top: auto; left: auto; right: auto; margin-bottom: 2.5rem; display: flex; width: 100%; max-width: 100%; border-radius: 0; background: transparent; border: none; box-shadow: none; padding: 0 0 1.5rem 0; border-bottom: 1px solid var(--card-border);">
      <a href="../index.html" class="admin-logo">
        <div class="logo-icon">S</div>
        shivangcodes.in <span style="font-size: 0.75rem; background: rgba(139, 92, 246, 0.15); color: var(--accent-purple); padding: 0.15rem 0.4rem; border-radius: 4px; font-weight: 500;">CMS</span>
      </a>
      <div class="admin-nav">
        <span class="admin-user" id="admin-user-display">
          <div class="admin-avatar" id="admin-avatar"></div>
          <span id="admin-name">Loading...</span>
        </span>
        <button class="btn-logout" id="logout-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out</button>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-info">
          <h3 id="stat-total">-</h3>
          <p>Total Posts</p>
        </div>
        <div class="stat-icon"><i class="fa-solid fa-file-invoice"></i></div>
      </div>
      <div class="stat-card">
        <div class="stat-info">
          <h3 id="stat-published">-</h3>
          <p>Published</p>
        </div>
        <div class="stat-icon"><i class="fa-solid fa-circle-check"></i></div>
      </div>
      <div class="stat-card">
        <div class="stat-info">
          <h3 id="stat-drafts">-</h3>
          <p>Drafts</p>
        </div>
        <div class="stat-icon"><i class="fa-solid fa-file-pen"></i></div>
      </div>
      <div class="stat-card">
        <div class="stat-info">
          <h3 id="stat-scheduled">-</h3>
          <p>Scheduled</p>
        </div>
        <div class="stat-icon"><i class="fa-solid fa-clock"></i></div>
      </div>
    </div>

    <!-- Actions bar -->
    <div class="actions-bar">
      <h2>My Articles</h2>
      <div class="actions-group">
        <a href="editor.html" class="btn-action-primary">
          <i class="fa-solid fa-plus"></i> New Article
        </a>
      </div>
    </div>

    <!-- Table content -->
    <div class="table-wrapper">
      <div id="loading" class="loading-spinner">
        <i class="fa-solid fa-spinner fa-spin fa-2xl" style="color: var(--accent-purple);"></i>
        <p style="margin-top: 1rem;">Retrieving articles from Cloud Firestore...</p>
      </div>
      
      <table id="posts-table" style="display: none;">
        <thead>
          <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Status</th>
            <th>Date Created</th>
            <th style="text-align: right;">Actions</th>
          </tr>
        </thead>
        <tbody id="posts-tbody">
          <!-- Injected dynamically -->
        </tbody>
      </table>

      <div id="empty-state" class="empty-state" style="display: none;">
        <i class="fa-regular fa-folder-open"></i>
        <p>No blog posts found. Write your very first post!</p>
      </div>
    </div>
  </div>

  <!-- Firebase Core SDK and Auth/Firestore Libraries -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  
  <!-- Firebase Project Configuration -->
  <script src="../firebase-config.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Validate Auth State
      window.auth.onAuthStateChanged(user => {
        if (!user) {
          window.location.href = 'login.html';
        } else {
          // Display user details
          const avatarUrl = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.email)}&background=8b5cf6&color=fff`;
          document.getElementById('admin-avatar').style.backgroundImage = `url('${avatarUrl}')`;
          document.getElementById('admin-name').innerText = user.displayName || user.email;
          
          // Load User Specific Posts
          loadDashboardPosts(user.uid);
        }
      });

      // Logout handler
      document.getElementById('logout-btn').addEventListener('click', () => {
        window.auth.signOut().then(() => {
          window.location.href = 'login.html';
        });
      });

      const table = document.getElementById('posts-table');
      const tbody = document.getElementById('posts-tbody');
      const loading = document.getElementById('loading');
      const emptyState = document.getElementById('empty-state');

      // Load all posts belonging strictly to this user
      async function loadDashboardPosts(userId) {
        try {
          const snapshot = await window.db.collection('posts')
            .where('authorId', '==', userId)
            .get();

          const posts = [];
          snapshot.forEach(doc => {
            posts.push({
              id: doc.id,
              ...doc.data()
            });
          });

          // Sort by created_at desc
          posts.sort((a, b) => {
            const timeA = a.created_at ? a.created_at.seconds || 0 : 0;
            const timeB = b.created_at ? b.created_at.seconds || 0 : 0;
            return timeB - timeA;
          });

          updateStats(posts);
          renderTable(posts);

        } catch (err) {
          console.error(err);
          loading.innerHTML = `
            <div style="color: #f87171; padding: 2rem;">
              <i class="fa-solid fa-circle-exclamation fa-2xl" style="margin-bottom: 1rem;"></i>
              <p>Failed to retrieve articles from Firebase Firestore.</p>
              <p style="font-size: 0.85rem; margin-top: 0.5rem; color: var(--text-muted);">${err.message}</p>
            </div>
          `;
        }
      }

      function updateStats(posts) {
        const total = posts.length;
        const published = posts.filter(p => p.status === 'published').length;
        const drafts = posts.filter(p => p.status === 'draft').length;
        const scheduled = posts.filter(p => p.status === 'scheduled').length;

        document.getElementById('stat-total').innerText = total;
        document.getElementById('stat-published').innerText = published;
        document.getElementById('stat-drafts').innerText = drafts;
        document.getElementById('stat-scheduled').innerText = scheduled;
      }

      function renderTable(posts) {
        loading.style.display = 'none';
        
        if (posts.length === 0) {
          table.style.display = 'none';
          emptyState.style.display = 'block';
          return;
        }

        emptyState.style.display = 'none';
        table.style.display = 'table';
        tbody.innerHTML = '';

        posts.forEach(post => {
          const tr = document.createElement('tr');
          
          // Format Date
          let createdDate = 'Unknown';
          if (post.created_at && post.created_at.seconds) {
            createdDate = new Date(post.created_at.seconds * 1000).toLocaleDateString('en-US', {
              year: 'numeric',
              month: 'short',
              day: 'numeric'
            });
          }

          // Status Badge Class
          let statusClass = 'status-draft';
          if (post.status === 'published') statusClass = 'status-published';
          if (post.status === 'scheduled') statusClass = 'status-scheduled';

          // If scheduled, show target date in status
          let statusText = post.status;
          if (post.status === 'scheduled' && post.scheduled_at) {
            const schedDate = new Date(post.scheduled_at).toLocaleDateString('en-US', {
              month: 'short',
              day: 'numeric',
              hour: '2-digit',
              minute: '2-digit'
            });
            statusText = `Sched (${schedDate})`;
          }

          const featuredIcon = post.featured ? '<i class="fa-solid fa-thumbtack featured-icon" title="Pinned to homepage featured list"></i>' : '';

          tr.innerHTML = `
            <td>
              <div class="post-title-cell">
                ${post.title} ${featuredIcon}
              </div>
            </td>
            <td><span class="post-category-cell">${post.category}</span></td>
            <td>
              <span class="status-badge ${statusClass}">
                ${statusText}
              </span>
            </td>
            <td style="color: var(--text-secondary); font-size: 0.9rem;">${createdDate}</td>
            <td>
              <div class="actions-column">
                <a href="../post.html?id=${post.slug}" target="_blank" class="btn-table" title="View Article (New Tab)">
                  <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
                <a href="editor.html?id=${post.id}" class="btn-table btn-table-edit" title="Edit Article">
                  <i class="fa-solid fa-pen-to-square"></i>
                </a>
                <button class="btn-table btn-table-delete" data-id="${post.id}" data-title="${post.title}" title="Delete Article">
                  <i class="fa-solid fa-trash-can"></i>
                </button>
              </div>
            </td>
          `;

          tbody.appendChild(tr);
        });

        // Attach event listeners to delete buttons
        document.querySelectorAll('.btn-table-delete').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = btn.getAttribute('data-id');
            const title = btn.getAttribute('data-title');
            
            if (confirm(`Are you absolutely sure you want to permanently delete "${title}"?`)) {
              btn.disabled = true;
              btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
              
              try {
                // Delete from Firestore
                await window.db.collection('posts').doc(id).delete();
                
                // Refresh dashboard
                loadDashboardPosts(window.auth.currentUser.uid);
                alert('Post deleted successfully.');

              } catch (err) {
                alert('Error deleting article: ' + err.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-trash-can"></i>';
              }
            }
          });
        });
      }
    });
  </script>
</body>
</html>
